name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Download ffmpeg for Android arm64-v8a
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        curl -L "https://github.com/hzw1199/Android-FFmpeg-Prebuilt/raw/main/ffmpeg-8.0.1/bin/ffmpeg" \
          -o app/src/main/jniLibs/arm64-v8a/libffmpeg.so
        chmod +x app/src/main/jniLibs/arm64-v8a/libffmpeg.so

    - name: Build with Gradle
      run: ./gradlew assembleDebug
